<style>
body {
margin: 0;
font-family: 'Cormorant Garamond', serif;
background: #fff;
color: #000;
}

nav {
position: sticky;
top: 0;
height: 60px;
background: black;
display: flex;
justify-content: space-between;
align-items: center;
padding: 0 30px;
}

.nav-links {
position: absolute;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 20px;
}

nav a {
color: white;
text-decoration: none;
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
}

.container {
max-width: 1100px;
margin: 100px auto;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 60px;
padding: 0 20px;
}

.product-image img {
width: 100%;
}

.product-info h1 {
font-size: 32px;
letter-spacing: 2px;
margin-bottom: 10px;
}

.price {
font-size: 20px;
margin-bottom: 25px; /* increased slightly */
font-family: "Palatino Linotype", Palatino, serif;
}

button {
background: black;
color: white;
border: none;
padding: 12px 20px;
cursor: pointer;
margin-right: 10px;
font-family: 'Cormorant Garamond', serif;
letter-spacing: 1px;
}

.colors {
margin: 25px 0 30px 0; /* better spacing below colours */
}

.color-wrapper {
display: inline-block;
text-align: center;
margin-right: 18px; /* slightly more space between colours */
}

.color-circle {
width: 30px;
height: 30px;
border-radius: 50%;
margin: 0 auto;
cursor: pointer;
}

.color-label {
font-size: 10px;
margin-top: 8px; /* cleaner spacing under circle */
}

select {
width: 200px;
padding: 10px;
font-family: 'Cormorant Garamond', serif;
border: 1px solid #000;
margin-top: 5px;
margin-bottom: 15px; /* spacing before button */
}

.add-btn {
margin-top: 5px;
margin-bottom: 30px; /* space before description */
padding: 14px 30px;
}

.description {
line-height: 1.7;
font-size: 14px;
color: #333;
white-space: pre-line;
margin-top: 10px; /* gentle separation */
}

@media(max-width:768px){
.container {
grid-template-columns: 1fr;
}
}
</style>
