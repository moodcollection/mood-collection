<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details | MØØD COLLECTION</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family: Arial; }

/* NAV */
nav {
position: sticky;
top: 0;
height: 60px;
background: black;
display: flex;
justify-content: space-between;
align-items: center;
padding: 0 30px;
color: white;
}

.nav-links {
position: absolute;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 20px;
}

nav a {
color: white;
text-decoration: none;
font-size: 10px;
letter-spacing: 1.5px;
text-transform: uppercase;
}

/* PRODUCT */
.container {
max-width: 1100px;
margin: 100px auto;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 40px;
padding: 0 20px;
}

.product-image img {
width: 100%;
}

.product-info h1 {
font-family: 'Cormorant Garamond';
font-size: 28px;
}

.price {
margin: 20px 0;
font-size: 18px;
}

.buttons {
margin: 20px 0;
}

.buttons button {
margin-right: 10px;
padding: 10px 15px;
cursor: pointer;
}

.colors {
margin: 20px 0;
}

.color-circle {
width: 30px;
height: 30px;
border-radius: 50%;
display: inline-block;
margin-right: 10px;
cursor: pointer;
}

</style>
</head>

<body>

<nav>
<div><img src="./MOOD-LOGO-WHITE.png" style="height:60px;"></div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div>BAG (0)</div>
</nav>

<div class="container">

<div class="product-image">
<img id="product-image" src="">
</div>

<div class="product-info">
<h1 id="product-title"></h1>

<div class="price" id="product-price">From £34.99</div>

<div class="buttons">
<button id="crew-btn">Crewneck</button>
<button id="hoodie-btn">Hoodie</button>
</div>

<div class="colors" id="color-options"></div>

</div>

</div>

<script>
const products = {
"busy-adulting": {
name: "Busy Adulting",
prices: { crew: 34.99, hoodie: 39.99 },
variants: {
crew: {
"GROUNDED": { img: "/images/ba-b-crewneck.png", color:"#beb8a9" },
"MIDNIGHT": { img: "/images/ba-bl-crewneck.png", color:"#000" },
"CHARCOAL": { img: "/images/ba-c-crewneck.png", color:"#413e41" },
"AFTER HOURS": { img: "/images/ba-e-crewneck.png", color:"#54413b" }
},
hoodie: {
"GROUNDED": { img: "/images/ba-b.png", color:"#beb8a9" },
"MIDNIGHT": { img: "/images/ba-bl.png", color:"#000" },
"CHARCOAL": { img: "/images/ba-c.png", color:"#413e41" },
"AFTER HOURS": { img: "/images/ba-e.png", color:"#54413b" },
"CLOUD 9": { img: "/images/ba-v.png", color:"#e7dcd4" }
}
}
}
};

function loadProduct() {
const params = new URLSearchParams(window.location.search);
const key = params.get("name") || "busy-adulting";

const product = products[key];
let type = "crew";
let color = Object.keys(product.variants[type])[0];

const img = document.getElementById("product-image");
const price = document.getElementById("product-price");
const title = document.getElementById("product-title");
const colors = document.getElementById("color-options");

title.textContent = product.name;

function update() {
img.src = product.variants[type][color].img;
price.textContent = "£" + product.prices[type];
}

function renderColors() {
colors.innerHTML = "";
Object.keys(product.variants[type]).forEach(c => {
const el = document.createElement("div");
el.className = "color-circle";
el.style.background = product.variants[type][c].color;
el.onclick = () => { color = c; update(); };
colors.appendChild(el);
});
}

document.getElementById("crew-btn").onclick = () => {
type = "crew";
color = Object.keys(product.variants.crew)[0];
renderColors();
update();
};

document.getElementById("hoodie-btn").onclick = () => {
type = "hoodie";
color = Object.keys(product.variants.hoodie)[0];
renderColors();
update();
};

renderColors();
update();
}

loadProduct();
</script>

</body>
</html>
