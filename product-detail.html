<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details | MØØD COLLECTION</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
margin: 0;
font-family: 'Cormorant Garamond', serif;
background: #fff;
color: #000;
}

nav {
position: sticky;
top: 0;
height: 60px;
background: black;
display: flex;
justify-content: space-between;
align-items: center;
padding: 0 30px;
}

.nav-links {
position: absolute;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 20px;
}

nav a {
color: white;
text-decoration: none;
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
}

.container {
max-width: 1100px;
margin: 100px auto;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 60px;
padding: 0 20px;
}

.product-image img {
width: 100%;
}

.product-info h1 {
font-size: 32px;
letter-spacing: 2px;
margin-bottom: 10px;
font-family: 'Cormorant Garamond', serif;
}

.price {
font-size: 20px;
margin-bottom: 20px;
font-family: "Palatino Linotype", Palatino, serif;
}

.buttons button {
background: black;
color: white;
border: none;
padding: 12px 20px;
cursor: pointer;
margin-right: 10px;
font-family: 'Cormorant Garamond', serif;
letter-spacing: 1px;
}

.colors {
margin: 20px 0;
}

.color-wrapper {
display: inline-block;
text-align: center;
margin-right: 15px;
}

.color-circle {
width: 30px;
height: 30px;
border-radius: 50%;
margin: 0 auto;
cursor: pointer;
}

.color-label {
font-size: 10px;
margin-top: 5px;
}

.description {
line-height: 1.7;
font-size: 14px;
color: #333;
font-family: 'Cormorant Garamond', serif;
white-space: pre-line;
}

@media(max-width:768px){
.container {
grid-template-columns: 1fr;
}
}
</style>
</head>

<body>

<nav>
<div><img src="./MOOD-LOGO-WHITE.png" style="height:60px;"></div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div>BAG (0)</div>
</nav>

<div class="container">

<div class="product-image">
<img id="product-image">
</div>

<div class="product-info">

<h1 id="product-title"></h1>
<div class="price" id="product-price">From £34.99</div>

<div>
<button id="crew-btn">Crewneck</button>
<button id="hoodie-btn">Hoodie</button>
</div>

<div class="colors" id="color-options"></div>

<div class="description" id="product-description"></div>

</div>

</div>

<script>

function formatDescription(text){
let html = text;

// Only bold specific MØØD words
html = html.replace(/MØØD\./g, '<strong>MØØD.</strong>');
html = html.replace(/signature MØØD/g, 'signature <strong>MØØD</strong>');

// line breaks
html = html.replace(/\n/g, '<br>');

return html;
}

const products = {

"busy-adulting": {
name: "BUSY ADULTING",
description: `For the days filled with errands, busy schedules, and life admin. Comfort that keeps up while you get things done.

Experience the ultimate in comfort and quality with our heavyweight hoodie. Crafted for softness and durability, you'll feel the difference the moment you put it on. It's warm without bulk, structured without stiffness, and comfortable enough to become your everyday essential. The clean, versatile design makes it effortless to style and wear on repeat. It looks good, feels even better, and is built to last.

Ready to match your MØØD.

Style & Color Options:
Hoodie: Available in Midnight, After Hours, DnD, Grounded, and Cloud 9.
Crewneck: Available in Midnight, After Hours, DnD, and Grounded.

(Please note: Cloud 9 is exclusive to the Hoodie only.)

Fabric Composition:
70% Ring-spun Cotton
30% Recycled Polyester
440 GSM heavyweight fabric for superior quality.

Fit & Styling:
Designed for a clean, structured look. For the signature MØØD oversized silhouette, we recommend sizing up.`,
prices:{crew:34.99, hoodie:39.99},
variants:{
crew:{
"GROUNDED":{img:"/images/ba-b-crewneck.png",color:"#beb8a9"},
"MIDNIGHT":{img:"/images/ba-bl-crewneck.png",color:"#000"},
"DND":{img:"/images/ba-c-crewneck.png",color:"#413e41"},
"AFTER HOURS":{img:"/images/ba-e-crewneck.png",color:"#54413b"}
},
hoodie:{
"GROUNDED":{img:"/images/ba-b.png",color:"#beb8a9"},
"MIDNIGHT":{img:"/images/ba-bl.png",color:"#000"},
"DND":{img:"/images/ba-c.png",color:"#413e41"},
"AFTER HOURS":{img:"/images/ba-e.png",color:"#54413b"},
"CLOUD 9":{img:"/images/ba-v.png",color:"#e7dcd4"}
}
}
}

};

function loadProduct(){
const params=new URLSearchParams(window.location.search);
const key=params.get("name")||"busy-adulting";

const product=products[key];
let type="crew";
let color=Object.keys(product.variants[type])[0];

const img=document.getElementById("product-image");
const price=document.getElementById("product-price");
const title=document.getElementById("product-title");
const colors=document.getElementById("color-options");
const desc=document.getElementById("product-description");

title.textContent=product.name;
desc.innerHTML=formatDescription(product.description);

function update(){
img.src=product.variants[type][color].img;
price.textContent="£"+product.prices[type];
}

function renderColors(){
colors.innerHTML="";
Object.keys(product.variants[type]).forEach(c=>{
const wrapper=document.createElement("div");
wrapper.className="color-wrapper";

const el=document.createElement("div");
el.className="color-circle";
el.style.background=product.variants[type][c].color;

const label=document.createElement("div");
label.className="color-label";
label.textContent=c;

el.onclick=()=>{
color=c;
update();
};

wrapper.appendChild(el);
wrapper.appendChild(label);
colors.appendChild(wrapper);
});
}

document.getElementById("crew-btn").onclick=()=>{
type="crew";
color=Object.keys(product.variants.crew)[0];
renderColors();
update();
};

document.getElementById("hoodie-btn").onclick=()=>{
type="hoodie";
color=Object.keys(product.variants.hoodie)[0];
renderColors();
update();
};

renderColors();
update();
}

loadProduct();
</script>

</body>
</html>
