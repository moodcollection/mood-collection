<script>

function formatDescription(text){
let html = text;
html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
html = html.replace(/(?:\r?\n)- (.*)/g, '<li>$1</li>');
html = html.replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');
html = html.replace(/\n/g, '<br>');
return html;
}

const baseDescription = `
Experience the ultimate in comfort and quality with our heavyweight hoodie. Crafted for softness and durability, you'll feel the difference the moment you put it on. It's warm without bulk, structured without stiffness, and comfortable enough to become your everyday essential. The clean, versatile design makes it effortless to style and wear on repeat. It looks good, feels even better, and is built to last.
Ready to match your MØØD.

**Style & Color Options:**
Hoodie: Available in Midnight, After Hours, DnD, Grounded, and Cloud 9.
Crewneck: Available in Midnight, After Hours, DnD, and Grounded.
*(Cloud 9 is exclusive to the Hoodie only.)*

**Fabric Composition:**
- 70% Ring-spun Cotton
- 30% Recycled Polyester
- 440 GSM heavyweight fabric

**Fit & Styling:**
Designed for a clean, structured look. For the signature MØØD oversized silhouette, we recommend sizing up.
`;

const products = {

"busy-adulting": {
name:"BUSY ADULTING",
desc:`**For the days filled with errands, busy schedules, and life admin.**\n\n${baseDescription}`
},

"authentically-me": {
name:"AUTHENTICALLY ME",
desc:`**Soft confidence. No explaining. No shrinking. Just showing up as you are.**\n\n${baseDescription}`
},

"present-enough": {
name:"PRESENT ENOUGH",
desc:`**For the days when you're here… but gently. Showing up without pressure.**\n\n${baseDescription}`
},

"mentally-offline": {
name:"MENTALLY OFFLINE",
desc:`**When the world gets loud, find your quiet. Disconnect and reset.**\n\n${baseDescription}`
},

"face-your-front": {
name:"FACE YOUR FRONT",
desc:`**Focus on your lane, your pace, your path. No comparisons.**\n\n${baseDescription}`
}

};

const images = {
"busy-adulting":"/images/ba-b.png",
"authentically-me":"/images/am-b.png",
"present-enough":"/images/pe-b.png",
"mentally-offline":"/images/mo-b.png",
"face-your-front":"/images/fyf-b.png"
};

function loadProduct(){
const params=new URLSearchParams(window.location.search);
const key=params.get("name")||"busy-adulting";

const product=products[key];

document.getElementById("product-title").textContent=product.name;
document.getElementById("product-description").innerHTML=formatDescription(product.desc);
document.getElementById("product-image").src=images[key];
document.getElementById("product-price").textContent="From £34.99";
}

loadProduct();

</script>
