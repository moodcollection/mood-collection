backend:
  name: git-gateway
  branch: main
publish_mode: simple
media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Product Type", name: "type", widget: "select", options: ["Hoodie", "Crewneck"]}
      - {label: "Price", name: "price", widget: "string", default: "34.99"}
      - {label: "Main Image", name: "image", widget: "image"}
      - {label: "Description", name: "body", widget: "markdown"}
      - label: "Sizes"
        name: "sizes"
        widget: "list"
        fields:
          - {label: "Size (S, M, L, XL)", name: "size", widget: "string"}
      - label: "Colors"
        name: "colors"
        widget: "list"
        fields:
          - {label: "Color Name", name: "color", widget: "string"}
