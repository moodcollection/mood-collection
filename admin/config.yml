backend:
  name: git-gateway
  branch: main # This matches your current branch

media_folder: "images" # Where your photos are stored
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "products" # If your folder on GitHub is actually named _products, change this to "_products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "Main Image", name: "image", widget: "image"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    files:
      - label: "About Page"
        name: "about"
        file: "content/about.md"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Page Image", name: "page_image", widget: "image"}
          - {label: "Story Title", name: "story_title", widget: "string"}
          - {label: "Resilience Story", name: "body", widget: "markdown"}
      
      - label: "Shipping Policy"
        name: "shipping"
        file: "content/shipping.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Policy Content", name: "body", widget: "markdown"}

      - label: "Returns Policy"
        name: "returns"
        file: "content/returns.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Policy Content", name: "body", widget: "markdown"}
