backend:
  name: git-gateway
  branch: main

publish_mode: simple
media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Product Title", name: "title", widget: "string"}
      - {label: "Priority (1 = First)", name: "priority", widget: "number", default: 10}
      - {label: "Default Price", name: "price", widget: "string", default: "34.99"}
      - {label: "Main Image", name: "image", widget: "image"}
      - {label: "Description", name: "body", widget: "markdown"}
      
      - label: "Sizes"
        name: "sizes"
        widget: "list"
        fields:
          - label: "Size"
            name: "size"
            widget: "select"
            options: ["XS", "S", "M", "L", "XL", "XXL"]

      - label: "Color/Type Variants"
        name: "variants"
        widget: "list"
        fields:
          - {label: "Color/Style Name", name: "color_name", widget: "string"}
          - {label: "Hex Code", name: "hex", widget: "string"}
          - {label: "Variant Image", name: "variant_image", widget: "image"}
          - {label: "Price", name: "price", widget: "string", default: "39.99"}

  - name: "pages"
    label: "Pages"
    files:
      - label: "About Page"
        name: "about"
        file: "products/about_page.md"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Main Image", name: "page_image", widget: "image"}
          - {label: "Story Title", name: "story_title", widget: "string"}
          - {label: "The Story", name: "body", widget: "markdown"}
