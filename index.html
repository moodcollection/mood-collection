<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MØØD COLLECTION | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #707070; }
        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* UNIVERSAL HEADER - 70px Logo, Black BG, No expanding menus */
        nav { position: sticky; top: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 50px; box-sizing: border-box; }
        .header-logo img { height: 70px; width: auto; display: block; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 25px; align-items: center; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-weight: 400; }
        .nav-right { display: flex; gap: 20px; align-items: center; color: #fff; font-size: 11px; }

        .hero { height: 25vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; margin: 0; letter-spacing: 10px; text-transform: uppercase; }
        .tagline { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; letter-spacing: 5px; text-transform: uppercase; color: var(--accent); }

        .collection-grid { padding: 40px 5% 100px; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px 30px; }
        .product-card { text-align: center; text-decoration: none; color: inherit; display: block; }
        .image-box { width: 100%; aspect-ratio: 3 / 4; background: #f7f7f7; overflow: hidden; margin-bottom: 20px; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .product-title { text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-weight: 600; display: block; margin-bottom: 8px; }
        .product-price { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; color: var(--accent); }

        @media (max-width: 768px) { 
            nav { padding: 0 20px; } .nav-links { display: none; }
            .brand-name { font-size: 2.2rem; } .collection-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="header-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png" alt="MØØD"></a></div>
        <div class="nav-links">
            <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="#">Search</a>
        </div>
        <div class="nav-right"><a href="#">ACCOUNT</a><a href="#">BAG (0)</a></div>
    </nav>

    <section class="hero">
        <h1 class="brand-name">MØØD COLLECTION</h1>
        <p class="tagline">YOUR MØØD, YOUR STYLE</p>
    </section>

    <div class="collection-grid" id="main-product-grid"></div>

    <script>
        async function fetchCollection() {
            const grid = document.getElementById('main-product-grid');
            try {
                const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products');
                let files = await response.json();
                grid.innerHTML = ''; 
                files = files.filter(f => f.name.endsWith('.md') && f.name !== 'about_page.md' && f.name !== 'index.md');

                let products = [];
                for (let file of files) {
                    const res = await fetch(file.download_url);
                    const text = await res.text();
                    const title = text.match(/title:\s*"(.*?)"/)?.[1];
                    const priority = parseInt(text.match(/priority:\s*(.*)/)?.[1]) || 99;
                    const price = text.match(/price:\s*"(.*?)"/)?.[1] || "34.99";
                    let img = text.match(/image:\s*"(.*?)"/)?.[1] || "";
                    if (img.startsWith('/')) img = '.' + img;
                    if (title) products.push({ title, price, img, slug: file.name.replace('.md',''), priority });
                }

                // SORT BY PRIORITY
                products.sort((a, b) => a.priority - b.priority);
                products.forEach(p => {
                    grid.innerHTML += `
                        <a href="product-detail.html?id=${p.slug}" class="product-card">
                            <div class="image-box"><img src="${p.img}"></div>
                            <div class="product-info">
                                <span class="product-title">${p.title}</span>
                                <span class="product-price">£${p.price}</span>
                            </div>
                        </a>`;
                });
            } catch (err) { console.error(err); }
        }
        fetchCollection();
    </script>
</body>
</html>
