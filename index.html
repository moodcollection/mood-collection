<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MØØD COLLECTION | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #707070; }
        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        
        nav { position: sticky; top: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 50px; box-sizing: border-box; }
        .header-logo img { height: 70px; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 2.5px; font-weight: 400; }

        .hero { height: 25vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; margin: 0; letter-spacing: 10px; text-transform: uppercase; }
        .tagline { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; color: var(--accent); }

        .collection-grid { padding: 40px 5% 100px; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px 30px; }
        .product-card { text-align: center; text-decoration: none; color: inherit; display: block; }
        .image-box { width: 100%; aspect-ratio: 3 / 4; background: #f7f7f7; overflow: hidden; margin-bottom: 20px; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s ease; }
        .product-card:hover img { opacity: 0.85; }

        .product-info { margin-top: 15px; }
        .product-title { text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-weight: 600; display: block; margin-bottom: 8px; }
        .product-price { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; color: var(--accent); }

        footer { padding: 80px 5% 50px; border-top: 1px solid #f0f0f0; display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 50px; font-size: 11px; text-transform: uppercase; }
        .footer-bottom { grid-column: 1 / -1; text-align: center; margin-top: 80px; color: #ccc; border-top: 1px solid #f9f9f9; padding-top: 30px; font-size: 9px; }

        @media (max-width: 1024px) { .collection-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            nav { padding: 0 20px; } .nav-links { display: none; }
            .brand-name { font-size: 2.2rem; } .collection-grid { grid-template-columns: 1fr; }
            footer { grid-template-columns: 1fr; text-align: center; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="header-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png" alt="MØØD"></a></div>
        <div class="nav-links">
            <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a>
        </div>
        <div class="nav-right"><a href="#" style="color:#fff; text-decoration:none; font-size:10px;">BAG (0)</a></div>
    </nav>

    <section class="hero">
        <h1 class="brand-name">MØØD COLLECTION</h1>
        <p class="tagline">YOUR MØØD, YOUR STYLE</p>
    </section>

    <section class="collection-grid" id="main-product-grid"></section>

    <footer>
        <div class="footer-col">
            <h4>Mailing List</h4>
            <input type="email" placeholder="ENTER YOUR EMAIL" style="border:none; border-bottom:1px solid #000; width:80%; padding:10px 0; outline:none; font-size: 10px; background: transparent;">
        </div>
        <div class="footer-col">
            <h4>Information</h4>
            <a href="shipping.html" style="text-decoration:none; color:#707070;">Shipping & Delivery</a><br><br>
            <a href="returns.html" style="text-decoration:none; color:#707070;">Returns & Exchanges</a>
        </div>
        <div class="footer-col">
            <h4>Connect</h4>
            <a href="https://instagram.com/moodcollectionofficial" style="text-decoration:none; color:#707070;">Instagram</a><br><br>
            <a href="https://tiktok.com/@moodcollectionofficial" style="text-decoration:none; color:#707070;">TikTok</a>
        </div>
        <div class="footer-bottom">© 2026 MØØD COLLECTION. ALL RIGHTS RESERVED.</div>
    </footer>

    <script>
        async function fetchCollection() {
            const grid = document.getElementById('main-product-grid');
            try {
                const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products');
                let files = await response.json();
                grid.innerHTML = ''; 
                files = files.filter(f => f.name.endsWith('.md') && f.name !== 'about_page.md' && f.name !== 'index.md');

                const order = ['busy-adulting', 'mentally-offline', 'face-your-front', 'authentically-me'];
                files.sort((a, b) => {
                    let idxA = order.findIndex(o => a.name.includes(o));
                    let idxB = order.findIndex(o => b.name.includes(o));
                    return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
                });

                for (let i = 0; i < files.length; i++) {
                    const res = await fetch(files[i].download_url);
                    const text = await res.text();
                    const title = text.match(/title:\s*"(.*?)"/)?.[1];
                    if (!title) continue;
                    const price = text.match(/price:\s*"(.*?)"/)?.[1] || "34.99";
                    let img = text.match(/image:\s*"(.*?)"/)?.[1] || "";
                    if (img.startsWith('/')) img = '.' + img;
                    const slug = files[i].name.replace('.md', '');
                    grid.innerHTML += `
                        <a href="product-detail.html?id=${slug}" class="product-card">
                            <div class="image-box"><img src="${img}" alt="${title}"></div>
                            <div class="product-info">
                                <span class="product-title">${title}</span>
                                <span class="product-price">£${price}</span>
                            </div>
                        </a>`;
                }
            } catch (err) { console.error(err); }
        }
        fetchCollection();
    </script>
</body>
</html>
