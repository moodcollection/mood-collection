<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MØØD COLLECTION | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --neutral-light: #ffffff; --neutral-dark: #000000; --header-bg: #000000; --text-on-black: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--neutral-light); color: var(--neutral-dark); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* STICKY NAVIGATION */
        nav { position: sticky; top: 0; width: 100%; height: 60px; background-color: var(--header-bg); display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 30px; box-sizing: border-box; }
        .header-logo img { height: 80px; position: relative; top: -5px; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        nav a, .nav-icon { text-decoration: none; color: var(--text-on-black); text-transform: uppercase; font-size: 10px; letter-spacing: 1.5px; cursor: pointer; }

        /* HERO SECTION */
        .hero { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 300; margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .tagline { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; letter-spacing: 4px; text-transform: uppercase; margin: 10px 0 30px; opacity: 0.8; }

        /* THE 1-2-3-1 STAGGERED GRID */
        .section-title { text-align: center; text-transform: uppercase; font-size: 12px; letter-spacing: 3px; margin: 60px 0 30px; }
        .collection-grid { padding: 0 5%; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(6, 1fr); gap: 25px; }
        
        .product-card { text-align: center; text-decoration: none; color: inherit; display: block; margin-bottom: 50px; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
        .image-box { width: 100%; background: #f9f9f9; aspect-ratio: 4/5; overflow: hidden; margin-bottom: 15px; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* GRID SIZES */
        .large { grid-column: span 6; aspect-ratio: 16/9; } /* The 1 (Hero) */
        .medium { grid-column: span 3; } /* The 2 (Side-by-side) */
        .small { grid-column: span 2; }  /* The 3 (Trio) */

        /* FOOTER */
        footer { border-top: 1px solid #eee; padding: 80px 5% 40px; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px; background: #fff; margin-top: 100px; }
        .footer-col h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .footer-col a { display: block; text-decoration: none; color: #666; font-size: 12px; margin-bottom: 12px; }
        .footer-bottom { grid-column: 1 / -1; text-align: center; font-size: 9px; letter-spacing: 1px; color: #999; margin-top: 50px; padding-top: 20px; border-top: 1px solid #f9f9f9; }

        @media (max-width: 768px) { 
            .nav-links { display: none; } 
            .brand-name { font-size: 2.5rem; } 
            .collection-grid { grid-template-columns: 1fr; } 
            .large, .medium, .small { grid-column: span 1; aspect-ratio: 4/5; } 
            footer { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <nav>
        <div class="header-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png" alt="MØØD"></a></div>
        <div class="nav-links">
            <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <a href="#" class="nav-icon">CART (0)</a>
        </div>
    </nav>

    <section class="hero">
        <h1 class="brand-name">MØØD COLLECTION</h1>
        <p class="tagline">YOUR MØØD, YOUR STYLE</p>
    </section>

    <div class="section-title">The Collection</div>
    <section class="collection-grid" id="main-product-grid">
        <!-- Products will load here automatically -->
    </section>

    <footer>
        <div class="footer-col"><h4>Join the MØØD</h4><p style="font-size:11px; color:#999; margin-bottom:15px;">Early access to drops.</p><input type="email" placeholder="EMAIL ADDRESS" style="border:none; border-bottom:1px solid #000; width:100%; padding:10px 0; outline:none; font-size:12px;"></div>
        <div class="footer-col"><h4>Support</h4><a href="shipping.html">Shipping</a><a href="returns.html">Returns</a><a href="contact.html">Contact</a></div>
        <div class="footer-col"><h4>Connect</h4><a href="https://www.instagram.com/moodcollectionofficial">Instagram</a><a href="https://www.tiktok.com/@moodcollectionofficial">TikTok</a></div>
        <div class="footer-bottom">© 2026 MØØD COLLECTION. ALL RIGHTS RESERVED.</div>
    </footer>

    <script>
        async function fetchCollection() {
            const grid = document.getElementById('main-product-grid');
            try {
                // 1. Fetch products from GitHub
                const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products');
                const files = await response.json();
                grid.innerHTML = ''; 

                // 2. Sort or loop through products
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const text = await res.text();

                        // Extract data from the Markdown file
                        const title = text.match(/title:\s*"(.*?)"/)?.[1] || "MØØD Item";
                        const price = text.match(/price:\s*"(.*?)"/)?.[1] || "0.00";
                        let img = text.match(/image:\s*"(.*?)"/)?.[1] || "";
                        
                        // IMAGE PATH FIXER: Ensures the browser finds the 'images' folder
                        if (img.startsWith('/')) { img = '.' + img; }

                        const slug = file.name.replace('.md', '');

                        // 3. APPLY 1-2-3-1 PATTERN
                        let sizeClass = 'small';
                        if (i === 0) sizeClass = 'large';
                        else if (i === 1 || i === 2) sizeClass = 'medium';

                        grid.innerHTML += `
                            <a href="product-detail.html?id=${slug}" class="product-card ${sizeClass}">
                                <div class="image-box"><img src="${img}" alt="${title}" onerror="this.src='https://via.placeholder.com/600x800?text=MØØD+Image'"></div>
                                <div style="margin-top:15px;">
                                    <strong style="text-transform:uppercase; letter-spacing:1px; font-size:11px;">${title}</strong>
                                    <div style="font-family:'Cormorant Garamond', serif; font-style:italic; margin-top:5px;">£${price}</div>
                                </div>
                            </a>
                        `;
                    }
                }
            } catch (err) { 
                console.error("Error:", err);
                grid.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Collection arriving soon...</p>";
            }
        }
        fetchCollection();
    </script>
</body>
</html>
