<body>
    <div id="searchBar"><input type="text" placeholder="SEARCH MØØD..."><span style="position:absolute; right:50px; cursor:pointer;" onclick="toggleSearch()">✕</span></div>
    
    <!-- STICKY HEADER -->
    <nav>
        <div class="header-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png" alt="MØØD"></a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <span class="nav-icon" onclick="toggleSearch()">Search</span>
        </div>
        <div class="nav-right">
            <a href="#" class="nav-icon">ACCOUNT</a>
            <a href="#" class="nav-icon" style="margin-left:15px;">CART (0)</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1 class="brand-name">MØØD COLLECTION</h1>
        <p class="tagline">YOUR MØØD, YOUR STYLE</p>
        <a href="shop.html" class="shop-now-btn">Explore Collection</a>
    </section>

    <!-- AUTOMATIC GRID: This pulls directly from your Admin files -->
    <section class="collection-grid" id="main-product-grid">
        <p style="text-align:center; grid-column: 1/-1;">Loading Collection...</p>
    </section>

    <footer>
        <div class="footer-col"><h4>Join the MØØD</h4><div class="newsletter-box"><input type="email" placeholder="EMAIL ADDRESS"></div></div>
        <div class="footer-col"><h4>Support</h4><a href="shipping.html">Shipping</a><a href="returns.html">Returns</a><a href="contact.html">Contact</a></div>
        <div class="footer-col"><h4>Connect</h4><a href="https://www.instagram.com/moodcollectionofficial">Instagram</a><a href="https://www.tiktok.com/@moodcollectionofficial">TikTok</a></div>
        <div class="footer-bottom">© 2026 MØØD COLLECTION. ALL RIGHTS RESERVED.</div>
    </footer>

    <script>
        function toggleSearch() { document.getElementById('searchBar').classList.toggle('active'); }

        async function fetchCollection() {
            const grid = document.getElementById('main-product-grid');
            try {
                // This tells the site: "Look at the PRODUCTS folder in GitHub"
                const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products');
                const files = await response.json();
                
                grid.innerHTML = ''; // Clear the "Loading" text

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const text = await res.text();

                        // Automatically grab whatever is in the Admin fields
                        const title = text.match(/title:\s*"(.*?)"/)?.[1] || "MØØD Item";
                        const price = text.match(/price:\s*"(.*?)"/)?.[1] || "0.00";
                        const img = text.match(/image:\s*"(.*?)"/)?.[1] || "";
                        const slug = file.name.replace('.md', '');

                        grid.innerHTML += `
                            <a href="product-detail.html?id=${slug}" class="product-card">
                                <div class="image-box"><img src="${img}" alt="${title}"></div>
                                <strong>${title}</strong>
                                <div>£${price}</div>
                            </a>
                        `;
                    }
                }
            } catch (err) {
                grid.innerHTML = "<p>Check Admin for Published Products</p>";
            }
        }
        fetchCollection();
    </script>
</body>
