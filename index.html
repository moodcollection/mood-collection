<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MØØD COLLECTION | Official Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">

<style>
:root { --bg: #ffffff; --text: #000000; --accent: #707070; }

body, html {
margin: 0;
padding: 0;
font-family: 'Helvetica Neue', Arial, sans-serif;
background-color: var(--bg);
color: var(--text);
-webkit-font-smoothing: antialiased;
overflow-x: hidden;
}

/* NAV */
nav {
position: sticky;
top: 0;
width: 100%;
height: 80px;
background: #000;
display: flex;
justify-content: space-between;
align-items: center;
z-index: 1000;
padding: 0 30px;
box-sizing: border-box;
}

.header-logo img {
height: 70px;
}

.nav-links {
display: flex;
gap: 20px;
}

nav a {
text-decoration: none;
color: #fff;
text-transform: uppercase;
font-size: 11px;
letter-spacing: 2px;
}

/* HERO */
.hero {
height: 90vh;
position: relative;
overflow: hidden;
}

.hero img {
width: 100%;
height: 100%;
object-fit: cover;
object-position: center 10%;
}

.hero-overlay {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
text-align: center;
color: white;
}

.brand-name {
font-family: 'Cormorant Garamond', serif;
font-size: 3rem;
letter-spacing: 8px;
text-transform: uppercase;
text-shadow: 0px 2px 6px rgba(0,0,0,0.4);
}

.tagline {
font-family: 'Cormorant Garamond', serif;
font-size: 1rem;
letter-spacing: 4px;
text-shadow: 0px 2px 6px rgba(0,0,0,0.4);
}

.hero-btn {
margin-top: 20px;
padding: 12px 25px;
background: #d6c7a1;
border: none;
cursor: pointer;
}

/* PRODUCT GRID */
.collection-grid {
padding: 40px 5%;
max-width: 1400px;
margin: 0 auto;
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 30px;
}

.image-box {
width: 100%;
aspect-ratio: 3/4;
background: #f7f7f7;
overflow: hidden;
margin-bottom: 15px;
}

.image-box img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
}

/* MOOD SECTION */
.mood-section {
padding: 60px 5%;
}

.mood-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 20px;
}

.mood-item img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
}

.mood-item.text {
display: flex;
align-items: center;
justify-content: center;
font-family: 'Cormorant Garamond', serif;
font-size: 20px;
text-align: center;
padding: 40px;
}

/* FOOTER */
footer {
text-align: center;
padding: 40px 20px;
font-size: 12px;
}

/* MOBILE */
@media (max-width: 768px) {

.collection-grid {
grid-template-columns: 1fr;
}

.mood-grid {
grid-template-columns: 1fr;
}

.brand-name {
font-size: 2rem;
}

}
</style>
</head>

<body>

<nav>
<div class="header-logo">
<a href="index.html"><img src="./MOOD-LOGO-WHITE.png"></a>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<div style="color:white;">BAG (0)</div>
</nav>

<section class="hero">
<img src="./images/HI0A5464BT.jpg">

<div class="hero-overlay">
<h1 class="brand-name">MØØD COLLECTION</h1>
<p class="tagline">YOUR MØØD, YOUR STYLE</p>
<button class="hero-btn" onclick="window.location.href='shop.html'">SHOP THE MØØD</button>
</div>
</section>

<div class="collection-grid" id="main-grid"></div>

<section class="mood-section">
<div class="mood-grid">

<div class="mood-item">
<img src="./images/IMAGE1.jpg">
</div>

<div class="mood-item">
<img src="./images/IMAGE2.jpg">
</div>

<div class="mood-item text">
<p>“Soft, structured, effortless.”</p>
</div>

<div class="mood-item">
<img src="./images/IMAGE3.jpg">
</div>

</div>
</section>

<footer>
<p>© 2026 MØØD COLLECTION. All rights reserved.</p>
</footer>

<script>
async function fetchProducts() {
const grid = document.getElementById('main-grid');

try {
const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products');
let files = await response.json();

files = files.filter(f => f.name.endsWith('.md') && !f.name.includes('about'));

for (let file of files) {
const res = await fetch(file.download_url);
const text = await res.text();

const title = text.match(/title:\s*"(.*?)"/)?.[1];
let img = text.match(/image:\s*"(.*?)"/)?.[1] || "";

if (img.startsWith('/')) img = '.' + img;

if (title) {
grid.innerHTML += `
<a href="product-detail.html?name=${file.name.replace('.md','')}" class="product-card">
<div class="image-box"><img src="${img}"></div>
<div style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:2px;">${title}</div>
</a>`;
}
}

} catch (err) {
console.error(err);
}
}

fetchProducts();
</script>

</body>
</html>
