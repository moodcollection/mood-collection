<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | MØØD COLLECTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #707070; }
        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* IDENTICAL HEADER */
        nav { position: sticky; top: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 50px; box-sizing: border-box; }
        .header-logo img { height: 70px; width: auto; display: block; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 25px; align-items: center; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; }
        .nav-right { display: flex; gap: 20px; color: #fff; font-size: 11px; }

        .shop-header { padding: 60px 5%; text-align: center; }
        .shop-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 8px; font-weight: 300; }
        .collection-grid { padding: 40px 5%; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px 30px; }
        .product-card { text-align: center; text-decoration: none; color: inherit; }
        .image-box { width: 100%; aspect-ratio: 3 / 4; background: #f7f7f7; overflow: hidden; margin-bottom: 20px; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .product-title { text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-weight: 600; display: block; }

        @media (max-width: 768px) { .collection-grid { grid-template-columns: 1fr; } .nav-links { display: none; } }
    </style>
</head>
<body>
    <nav>
        <div class="header-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png" alt="MØØD"></a></div>
        <div class="nav-links">
            <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="#">Search</a>
        </div>
        <div class="nav-right"><a href="#">ACCOUNT</a><a href="#">BAG (0)</a></div>
    </nav>
    <div class="shop-header"><h1>Collection</h1></div>
    <div id="shop-grid" class="collection-grid"></div>
    <script>
        async function fetchShop() {
            const grid = document.getElementById('shop-grid');
            try {
                const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products');
                let files = await response.json();
                files = files.filter(f => f.name.endsWith('.md') && f.name !== 'about_page.md');
                for (let file of files) {
                    const res = await fetch(file.download_url);
                    const text = await res.text();
                    const title = text.match(/title:\s*"(.*?)"/)?.[1];
                    let img = text.match(/image:\s*"(.*?)"/)?.[1] || "";
                    if (img.startsWith('/')) img = '.' + img;
                    if (title) {
                        grid.innerHTML += `
                        <a href="product-detail.html?id=${file.name.replace('.md','')}" class="product-card">
                            <div class="image-box"><img src="${img}"></div>
                            <div class="product-title">${title}</div>
                        </a>`;
                    }
                }
            } catch (err) { console.error(err); }
        }
        fetchShop();
    </script>
</body>
</html>
