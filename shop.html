<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | MØØD COLLECTION</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
body, html { margin: 0; padding: 0; font-family: 'Cormorant Garamond', serif; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
nav { position: sticky; top: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 30px; }
.nav-logo img { height: 55px; display: block; }
.nav-links { display: flex; gap: 25px; align-items: center; position: absolute; left: 50%; transform: translateX(-50%); }
.nav-links a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-family: 'Cormorant Garamond', serif; white-space: nowrap; }
.nav-links a:hover { opacity: 0.7; }
.nav-search input { background: none; border: none; border-bottom: 1px solid #555; color: #fff; font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 1px; padding: 2px 6px; width: 120px; outline: none; }
.nav-search input::placeholder { color: #777; text-transform: uppercase; }
.nav-right { color: #fff; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-family: 'Cormorant Garamond', serif; white-space: nowrap; cursor: pointer; }
.shop-header { padding: 60px 5%; text-align: center; }
.shop-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; letter-spacing: 8px; font-weight: 300; }
.collection-grid { padding: 40px 5%; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px 30px; }
.product-card { text-align: center; text-decoration: none; color: inherit; }
.image-box { width: 100%; aspect-ratio: 3/4; background: #f7f7f7; overflow: hidden; margin-bottom: 20px; }
.image-box img { width: 100%; height: 100%; object-fit: cover; }
.product-title { font-family: 'Cormorant Garamond', serif; text-transform: uppercase; font-size: 13px; letter-spacing: 2px; font-weight: 600; }
.product-price { font-family: 'Cormorant Garamond', serif; font-size: 13px; margin-top: 5px; color: #555; }
footer { background: #000; color: #fff; padding: 60px 5% 30px; font-family: 'Cormorant Garamond', serif; }
.footer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; margin-bottom: 40px; }
.footer-col h4 { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; font-weight: 600; }
.footer-col a { display: block; color: #aaa; text-decoration: none; font-size: 13px; letter-spacing: 1px; margin-bottom: 10px; }
.footer-col a:hover { color: #fff; }
.footer-social { display: flex; gap: 15px; margin-top: 10px; flex-direction: column; }
.footer-bottom { border-top: 1px solid #333; padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
.footer-bottom p { font-size: 12px; color: #555; letter-spacing: 1px; margin: 0; }
@media (max-width: 768px) {
  .nav-links { display: none; }
  .collection-grid { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png"></a></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="login.html">My Account</a>
    <a href="about.html">Our Story</a>
    <div class="nav-search"><input type="text" placeholder="Search"></div>
  </div>
  <div class="nav-right">My Cart (0)</div>
</nav>

<div class="shop-header">
  <h1>THE COLLECTION</h1>
</div>

<div class="collection-grid" id="shop-grid"></div>

<footer>
  <div class="footer-grid">
    <div class="footer-col">
      <h4>HELP</h4>
      <a href="contact.html">Contact Us</a>
      <a href="shipping.html">Shipping</a>
      <a href="returns.html">Returns</a>
      <a href="faq.html">FAQ</a>
    </div>
    <div class="footer-col">
      <h4>LEGAL</h4>
      <a href="terms.html">Terms &amp; Conditions</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
    <div class="footer-col">
      <h4>COLLECTION</h4>
      <a href="shop.html">Shop All</a>
      <a href="about.html">Our Story</a>
    </div>
    <div class="footer-col">
      <h4>FOLLOW THE MØØD</h4>
      <div class="footer-social">
        <a href="https://www.instagram.com/moodcollectionofficial/" target="_blank">Instagram</a>
        <a href="https://www.tiktok.com/@moodcollectionofficial" target="_blank">TikTok</a>
      </div>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 MØØD COLLECTION. ALL RIGHTS RESERVED.</p>
    <p>MADE WITH INTENTION.</p>
  </div>
</footer>

<script>
const products = [
  { name: "BUSY ADULTING", slug: "busy-adulting", image: "/images/THELMABA.JPG" },
  { name: "AUTHENTICALLY ME", slug: "authentically-me", image: "/images/KEETS.JPG" },
  { name: "PRESENT ENOUGH", slug: "present-enough", image: "/images/RIRI2.jpg" },
  { name: "MENTALLY OFFLINE", slug: "mentally-offline", image: "/images/LEX.JPG" },
  { name: "FACE YOUR FRONT", slug: "face-your-front", image: "/images/JOSH2.JPG" }
];

const grid = document.getElementById("shop-grid");
products.forEach(product => {
  grid.innerHTML += `
    <a href="product-detail.html?name=${product.slug}" class="product-card">
      <div class="image-box"><img src="${product.image}" alt="${product.name}"></div>
      <div class="product-title">${product.name}</div>
      <div class="product-price">From £34.99</div>
    </a>
  `;
});
</script>
</body>
</html>
