<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | MØØD COLLECTION</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root { --bg: #ffffff; --text: #000000; }

body, html {
margin: 0;
padding: 0;
font-family: 'Helvetica Neue', Arial, sans-serif;
background-color: var(--bg);
color: var(--text);
}

/* HEADER */
nav {
position: sticky;
top: 0;
width: 100%;
height: 80px;
background: #000;
display: flex;
justify-content: space-between;
align-items: center;
padding: 0 50px;
}

.header-logo img {
height: 70px;
}

.nav-links {
position: absolute;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 25px;
}

nav a {
color: #fff;
text-decoration: none;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
}

.nav-right {
display: flex;
gap: 20px;
color: #fff;
font-size: 11px;
}

/* SHOP */
.shop-header {
padding: 60px 5%;
text-align: center;
}

.shop-header h1 {
font-family: 'Cormorant Garamond', serif;
font-size: 2.5rem;
letter-spacing: 8px;
font-weight: 300;
}

.collection-grid {
padding: 40px 5%;
max-width: 1400px;
margin: 0 auto;
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 40px 30px;
}

.product-card {
text-align: center;
text-decoration: none;
color: inherit;
}

.image-box {
width: 100%;
aspect-ratio: 3 / 4;
background: #f7f7f7;
overflow: hidden;
margin-bottom: 20px;
}

.image-box img {
width: 100%;
height: 100%;
object-fit: cover;
}

.product-title {
text-transform: uppercase;
font-size: 11px;
letter-spacing: 2px;
font-weight: 600;
}

.product-price {
font-size: 11px;
margin-top: 5px;
color: #555;
}

@media (max-width: 768px) {
.collection-grid { grid-template-columns: 1fr; }
.nav-links { display: none; }
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png"></a></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="login.html">My Account</a>
    <a href="about.html">Our Story</a>
    <div class="nav-search"><input type="text" placeholder="Search"></div>
  </div>
  <div class="nav-right">My Cart (0)</div>
</nav>

<div class="shop-header">
<h1>THE COLLECTION</h1>
</div>

<div class="collection-grid" id="shop-grid"></div>

<script>

const products = [
{
name: "BUSY ADULTING",
slug: "busy-adulting",
image: "/images/THELMABA.JPG"
},
{
name: "AUTHENTICALLY ME",
slug: "authentically-me",
image: "/images/KEETS.JPG"
},
{
name: "PRESENT ENOUGH",
slug: "present-enough",
image: "/images/RIRI2.jpg"
},
{
name: "MENTALLY OFFLINE",
slug: "mentally-offline",
image: "/images/LEX.jpg"
},
{
name: "FACE YOUR FRONT",
slug: "face-your-front",
image: "/images/JOSH2.JPG"
}
];

const grid = document.getElementById("shop-grid");

products.forEach(product => {
grid.innerHTML += `
<a href="product-detail.html?name=${product.slug}" class="product-card">
<div class="image-box">
<img src="${product.image}">
</div>
<div class="product-title">${product.name}</div>
<div class="product-price">From £34.99</div>
</a>
`;
});

</script>

</body>
</html>
