<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | MØØD COLLECTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --neutral-light: #ffffff; --neutral-dark: #000000; --header-bg: #000000; --text-on-black: #ffffff; }
        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--neutral-light); color: var(--neutral-dark); -webkit-font-smoothing: antialiased; }
        
        /* SEARCH BAR */
        #searchBar { position: fixed; top: -120px; left: 0; width: 100%; height: 100px; background: white; z-index: 3000; transition: 0.4s ease-in-out; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #000; }
        #searchBar.active { top: 0; }
        #searchBar input { width: 50%; border: none; border-bottom: 1px solid #000; font-size: 20px; outline: none; text-align: center; font-family: 'Cormorant Garamond', serif; }

        /* NAVIGATION */
        nav { position: fixed; top: 0; width: 100%; height: 60px; background-color: var(--header-bg); display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 30px; box-sizing: border-box; }
        .header-logo img { height: 80px; position: relative; top: -5px; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 25px; }
        nav a, .nav-icon { text-decoration: none; color: var(--text-on-black); text-transform: uppercase; font-size: 10px; letter-spacing: 1.5px; cursor: pointer; }

        /* CONTACT FORM */
        .contact-container { max-width: 600px; margin: 140px auto 100px; padding: 0 20px; text-align: center; }
        .contact-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 40px; font-weight: 300; }
        .form-group { margin-bottom: 35px; text-align: left; }
        .form-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; opacity: 0.5; }
        .form-group input, .form-group textarea { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 12px 0; font-size: 14px; outline: none; background: transparent; }
        .submit-btn { background: black; color: white; width: 100%; padding: 20px; border: none; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; cursor: pointer; }

        /* FOOTER */
        footer { border-top: 1px solid #eee; padding: 80px 5% 40px; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px; margin-top: 50px; background: #fff; }
        .footer-col h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .footer-col a { display: block; text-decoration: none; color: #666; font-size: 12px; margin-bottom: 12px; }

        @media (max-width: 768px) { .nav-links { display: none; } footer { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="searchBar"><input type="text" placeholder="SEARCH MØØD..."><span style="position:absolute; right:50px; cursor:pointer;" onclick="toggleSearch()">✕</span></div>
    <nav>
  <div class="nav-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png"></a></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="login.html">My Account</a>
    <a href="about.html">Our Story</a>
    <div class="nav-search"><input type="text" placeholder="Search"></div>
  </div>
  <div class="nav-right">My Cart (0)</div>
</nav>

    <div class="contact-container">
        <h1 class="contact-title">Contact Us</h1>
        
        <!-- UPDATED FOR WEB3FORMS -->
        <form action="https://api.web3forms.com/submit" method="POST">
            <!-- Replace YOUR_ACCESS_KEY_HERE with your actual Web3Forms Access Key -->
            <input type="hidden" name="access_key" value="4b58de4f-b639-4df5-97da-14e38032e640">
            
            <!-- Redirect to your custom thank-you page -->
            <input type="hidden" name="redirect" value="https://mymoodcollection.co.uk/thank-you.html">
            
            <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Message</label><textarea name="message" rows="4" required></textarea></div>
            
            <!-- Honeypot Spam Protection (Hidden from users) -->
            <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

    <footer>
        <div class="footer-col"><h4>Join the MØØD</h4><p style="font-size:12px; color:#666;">Early access to drops.</p><div class="newsletter-box"><input type="email" placeholder="EMAIL ADDRESS"></div></div>
        <div class="footer-col"><h4>Support</h4><a href="policy.html">Shipping</a><a href="policy.html">Returns</a><a href="contact.html">Contact Us</a></div>
        <div class="footer-col"><h4>Connect</h4><a href="https://www.instagram.com/moodcollectionofficial" target="_blank">Instagram</a><a href="https://www.tiktok.com/@moodcollectionofficial" target="_blank">TikTok</a></div>
    </footer>

    <script>
        function toggleSearch() { document.getElementById('searchBar').classList.toggle('active'); }
    </script>
</body>
</html>
