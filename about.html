<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | MØØD COLLECTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #707070; }
        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        
        nav { position: sticky; top: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 50px; box-sizing: border-box; }
        .header-logo img { height: 70px; width: auto; display: block; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 25px; align-items: center; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; }
        .nav-right { display: flex; gap: 20px; color: #fff; font-size: 11px; }

        .about-container { max-width: 1200px; margin: 0 auto; padding: 80px 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
        
        .about-image img { width: 100%; height: auto; display: block; object-fit: cover; }
        
        .about-content h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 300; text-transform: uppercase; letter-spacing: 5px; margin: 0 0 10px; }
        .about-content h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-style: italic; color: var(--accent); margin-bottom: 30px; }
        
        .about-text { line-height: 1.8; font-size: 16px; color: #333; }
        .about-text p { margin-bottom: 25px; }
        
        .about-text img { max-width: 100%; height: auto; display: block; margin: 30px 0; }

        @media (max-width: 768px) {
            .about-container { grid-template-columns: 1fr; padding: 40px 5%; }
            .nav-links { display: none; }
            .header-logo img { height: 55px; }
            .about-image { order: -1; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="header-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png" alt="MØØD"></a></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="#">Search</a>
        </div>
        <div class="nav-right">
            <a>ACCOUNT</a>
            <a>BAG (0)</a>
        </div>
    </nav>

    <div class="about-container" id="about-display">
        <p style="text-align:center; grid-column:1/-1;">Loading story...</p>
    </div>

    <script>
        async function loadAbout() {
            const display = document.getElementById('about-display');
            try {
                const response = await fetch('/products/about_page.md');
                const text = await response.text();
                
                const parts = text.split('---');
                const header = parts[1];
                const body = parts.slice(2).join('---').trim();

                let mainImg = header.match(/page_image:\s*"(.*?)"/)?.[1] || "";

                if (mainImg && !mainImg.startsWith('http')) {
                    mainImg = window.location.origin + mainImg;
                }

                const storyTitle = header.match(/story_title:\s*"(.*?)"/)?.[1] || "";

                display.innerHTML = `
                    <div class="about-image">
                        <img src="${mainImg}" alt="About MØØD">
                    </div>
                    <div class="about-content">
                        <h1>THE STORY BEHIND THE MØØD</h1>
                        <h2>${storyTitle}</h2>
                        <div class="about-text">${marked.parse(body)}</div>
                    </div>`;
            } catch (err) { 
                console.error(err);
                display.innerHTML = "<p>Error loading content.</p>";
            }
        }
        loadAbout();
    </script>
</body>
</html>
