<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 1. This line is CRITICAL. It tells the browser how to read the Ø symbol correctly -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | MØØD COLLECTION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #707070; }
        body, html { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* THE PERFECT CONSISTENT HEADER */
        nav { position: sticky; top: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 50px; box-sizing: border-box; }
        .header-logo img { height: 70px; width: auto; display: block; }
        .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 25px; align-items: center; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-weight: 400; }
        .nav-right { display: flex; gap: 20px; align-items: center; color: #fff; font-size: 11px; }

        /* ABOUT LAYOUT */
        .about-container { max-width: 1100px; margin: 0 auto; padding: 100px 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
        .about-image img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #f9f9f9; }
        
        .about-content h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 5px; }
        .about-content h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-style: italic; margin-bottom: 40px; color: var(--accent); }
        
        .about-text { line-height: 1.8; font-size: 16px; color: #333; }
        .about-text p { margin-bottom: 25px; }
        .about-text img { max-width: 100%; height: auto; margin: 30px 0; display: block; }

        @media (max-width: 768px) {
            .about-container { grid-template-columns: 1fr; padding: 60px 5%; }
            .nav-links { display: none; }
            .about-image { order: -1; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="header-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png" alt="MØØD"></a></div>
        <div class="nav-links">
            <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="#">Search</a>
        </div>
        <div class="nav-right"><a href="#">ACCOUNT</a><a href="#">BAG (0)</a></div>
    </nav>

    <div class="about-container" id="about-display">
        <p style="text-align:center; grid-column:1/-1;">Loading story...</p>
    </div>

    <script>
        async function loadAbout() {
            const display = document.getElementById('about-display');
            try {
                const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products/about_page.md');
                const data = await response.json();
                
                // Decode the text safely handling special characters like Ø
                const markdownRaw = decodeURIComponent(escape(atob(data.content)));

                const parts = markdownRaw.split('---');
                const headerContent = parts[1];
                const bodyContent = parts.slice(2).join('---').trim();

                const title = headerContent.match(/title:\s*"(.*?)"/)?.[1] || "";
                const storyTitle = headerContent.match(/story_title:\s*"(.*?)"/)?.[1] || "";
                let mainImg = headerContent.match(/page_image:\s*"(.*?)"/)?.[1] || "";
                if (mainImg.startsWith('/')) mainImg = '.' + mainImg;

                display.innerHTML = `
                    <div class="about-image"><img src="${mainImg}" alt="${title}"></div>
                    <div class="about-content">
                        <h1>${title}</h1>
                        <h2>${storyTitle}</h2>
                        <div class="about-text">${marked.parse(bodyContent)}</div>
                    </div>`;
            } catch (error) {
                console.error(error);
                display.innerHTML = "<p style='text-align:center; grid-column:1/-1;'>Please update your story in Admin and hit Publish.</p>";
            }
        }
        loadAbout();
    </script>
</body>
</html>
