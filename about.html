<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | MØØD COLLECTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff; color: #000; -webkit-font-smoothing: antialiased; }
        nav { background: #000; height: 80px; display: flex; justify-content: center; align-items: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: #fff; text-decoration: none; text-transform: uppercase; font-size: 11px; letter-spacing: 3px; }
        
        .about-container { max-width: 1100px; margin: 0 auto; padding: 100px 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
        .about-image img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #f9f9f9; }
        
        .about-content h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 5px; }
        .about-content h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-style: italic; margin-bottom: 40px; color: #707070; }
        
        .about-text { line-height: 1.8; font-size: 16px; color: #333; }
        .about-text p { margin-bottom: 25px; }
        .about-text img { max-width: 100%; height: auto; margin: 30px 0; display: block; }
        .about-text strong { color: #000; font-weight: 600; }

        @media (max-width: 768px) {
            .about-container { grid-template-columns: 1fr; padding: 60px 5%; }
            .about-content h1 { font-size: 2.5rem; }
            .about-image { order: -1; }
        }
    </style>
</head>
<body>
    <nav><a href="index.html">MØØD COLLECTION</a></nav>
    <div class="about-container" id="about-display">
        <p style="text-align: center; grid-column: 1/-1;">Loading story...</p>
    </div>

    <script>
        async function loadAbout() {
            const display = document.getElementById('about-display');
            try {
                const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products/about_page.md');
                const data = await response.json();
                const markdownRaw = atob(data.content);

                const parts = markdownRaw.split('---');
                const headerContent = parts[1];
                const bodyContent = parts.slice(2).join('---').trim();

                const title = headerContent.match(/title:\s*"(.*?)"/)?.[1] || "";
                const storyTitle = headerContent.match(/story_title:\s*"(.*?)"/)?.[1] || "";
                let mainImg = headerContent.match(/page_image:\s*"(.*?)"/)?.[1] || "";
                if (mainImg.startsWith('/')) mainImg = '.' + mainImg;

                // Marked.js turns Admin text into clean HTML, handling paragraphs and embedded images
                const storyHtml = marked.parse(bodyContent);

                display.innerHTML = `
                    <div class="about-image"><img src="${mainImg}" alt="${title}"></div>
                    <div class="about-content">
                        <h1>${title}</h1>
                        <h2>${storyTitle}</h2>
                        <div class="about-text">${storyHtml}</div>
                    </div>`;
            } catch (error) {
                display.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Update the About page in Admin to see content here.</p>";
            }
        }
        loadAbout();
    </script>
</body>
</html>
