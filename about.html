<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | MØØD COLLECTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; background: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        nav { position: sticky; top: 0; width: 100%; height: 80px; background: #000; display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 30px; box-sizing: border-box; }
        .header-logo img { height: 70px; }
        nav a { text-decoration: none; color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; }
        .about-container { max-width: 1200px; margin: 0 auto; padding: 80px 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .about-image img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .about-content h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; margin: 0; }
        .about-text { line-height: 1.8; color: #333; margin-top: 30px; font-size: 16px; }
        @media (max-width: 768px) { .about-container { grid-template-columns: 1fr; } .header-logo img { height: 55px; } }
    </style>
</head>
<body>
    <nav>
        <div class="header-logo"><a href="index.html"><img src="./MOOD-LOGO-WHITE.png" alt="MØØD"></a></div>
        <div style="display:flex; gap:20px;"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a></div>
    </nav>
    <div class="about-container" id="about-display"></div>
    <script>
        async function loadAbout() {
            const display = document.getElementById('about-display');
            try {
                const response = await fetch('https://api.github.com/repos/moodcollection/mood-collection/contents/products/about_page.md');
                const data = await response.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                const parts = content.split('---');
                const body = parts.slice(2).join('---').trim();
                let mainImg = content.match(/page_image:\s*"(.*?)"/)?.[1] || "";
                if (mainImg.startsWith('/')) mainImg = '.' + mainImg;
                display.innerHTML = `<div class="about-image"><img src="${mainImg}"></div><div class="about-content"><h1>THE STORY BEHIND THE MØØD</h1><div class="about-text">${marked.parse(body)}</div></div>`;
            } catch (err) { console.error(err); }
        }
        loadAbout();
    </script>
</body>
</html>
